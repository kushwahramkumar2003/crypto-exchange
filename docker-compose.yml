services:
  # ─────────────────────────────────────────
  #  PostgreSQL 16 (Alpine)
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: crypto_exchange_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-crypto_exchange}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-crypto_exchange}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - crypto_exchange_network

  # ─────────────────────────────────────────
  #  Redis 7 (Alpine)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: crypto_exchange_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - crypto_exchange_network

# ─────────────────────────────────────────
#  Named volumes
# ─────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ─────────────────────────────────────────
#  Networks
# ─────────────────────────────────────────
networks:
  crypto_exchange_network:
    driver: bridge
